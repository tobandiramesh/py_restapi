<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="background-glow"></div>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Employee Management</p>
      <h1>Employee Desk</h1>
      <p class="subtitle">Search employee details by ID and add new employee records in one place.</p>
    </header>

    <section class="grid">
      <article class="panel search-panel">
        <h2>Search by ID</h2>
        <form id="search-form" class="stack">
          <label for="emp-id">Employee ID</label>
          <div class="row">
            <input id="emp-id" name="emp-id" type="text" placeholder="e.g. EMP-0001 or 1" required>
            <button type="submit">Search</button>
          </div>
        </form>
        <div id="search-message" class="message" aria-live="polite"></div>
        <div id="employee-card" class="employee-card hidden" aria-live="polite"></div>
      </article>

      <article class="panel add-panel">
        <h2 id="form-title">Add Employee</h2>
        <p id="form-hint" class="subtitle panel-subtitle">Create a new employee record.</p>
        <form id="add-form" class="stack">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="John Carter" required>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="john.carter@company.com" required>

          <label for="salary">Salary</label>
          <input id="salary" name="salary" type="number" min="0" step="1" placeholder="65000" required>

          <label for="department">Department</label>
          <input id="department" name="department" type="text" placeholder="Engineering" required>

          <label for="manager">Manager</label>
          <input id="manager" name="manager" type="text" placeholder="Sarah Smith" required>

          <label for="geo-location">Geo Location</label>
          <input id="geo-location" name="geo-location" type="text" placeholder="Hyderabad, India" required>

          <div class="form-actions">
            <button id="submit-button" type="submit" class="full">Add Employee</button>
            <button id="cancel-edit-button" type="button" class="button-secondary hidden">Cancel Edit</button>
          </div>
        </form>
        <div id="add-message" class="message" aria-live="polite"></div>
      </article>

      <article class="panel details-panel full-width">
        <h2>Employee Details</h2>
        <div id="details-message" class="message" aria-live="polite"></div>
        <div class="details-toolbar">
          <input id="employee-filter" type="text" placeholder="Filter by ID, name, email, department, manager or location">
          <select id="sort-field" aria-label="Sort employees by field">
            <option value="id">Sort: ID</option>
            <option value="name">Sort: Name</option>
            <option value="salary">Sort: Salary</option>
            <option value="department">Sort: Department</option>
            <option value="manager">Sort: Manager</option>
          </select>
          <button id="sort-direction-button" type="button" class="button-secondary">Ascending</button>
          <button id="clear-filter-button" type="button" class="button-secondary">Clear</button>
        </div>
        <div class="table-wrap">
          <table id="employees-table" class="employees-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Salary</th>
                <th>Department</th>
                <th>Manager</th>
                <th>Geo Location</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="employees-table-body"></tbody>
          </table>
        </div>
        <div class="pagination-bar">
          <p id="pagination-summary" class="pagination-summary">Page 1</p>
          <div class="pagination-actions">
            <button id="prev-page-button" type="button" class="button-secondary">Previous</button>
            <button id="next-page-button" type="button" class="button-secondary">Next</button>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div id="employee-modal" class="modal hidden" aria-hidden="true">
    <div id="modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <p class="eyebrow modal-eyebrow">Employee Record</p>
          <h2 id="modal-title">Employee Details</h2>
        </div>
        <button id="close-modal-button" type="button" class="button-secondary">Close</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
